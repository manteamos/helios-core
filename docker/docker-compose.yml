services:

  # ----------------------------------------------------------------
  # Redis — Celery broker (db 0) and result backend (db 1)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # API — FastAPI + uvicorn (I/O only; no solver math runs here)
  # ----------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      HELIOS_REDIS_URL: redis://redis:6379/0
      HELIOS_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request, sys;
          r = urllib.request.urlopen('http://localhost:8000/health', timeout=4);
          sys.exit(0 if r.status == 200 else 1)
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 5

  # ----------------------------------------------------------------
  # Worker — Celery prefork pool; all NumPy/SciPy runs here
  #
  # Why prefork:  see api/celery_app.py for the full rationale.
  # concurrency=2 for local dev; set to os.cpu_count() in production
  # via CELERYD_CONCURRENCY env var or the --concurrency flag.
  # ----------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    command:
      - celery
      - -A
      - api.celery_app:celery_app
      - worker
      - --pool=prefork
      - --concurrency=2
      - --loglevel=info
    environment:
      HELIOS_REDIS_URL: redis://redis:6379/0
      HELIOS_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
